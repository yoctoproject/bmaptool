---
name: Test bmaptool

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          # Testing with native host python is required in order to test the
          # GPG code, since it must use the host python3-gpg package
          - "native"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - if: matrix.python-version != 'native'
        name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - if: matrix.python-version == 'native'
        name: Setup Native Python
        run: |
          sudo apt-get install -y python3 python3-pip libgpgme11-dev python3-gpg

      - name: Install dependencies
        run: |
          sudo apt-get install -y pbzip2 pigz lzop liblz4-tool
          python3 -m pip install --upgrade pip
          python3 -m pip install build

      - name: Build package
        run: |
          python3 -m build

      - name: Install package
        run: |
          python3 -m pip install -e .[dev]

      - name: Run tests
        run: |
          python3 -m unittest -vb

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python3 -m pip install ruff==0.15.14
      - name: ruff format --check
        run: ruff format --check .
      - name: Install pip-audit
        run: python3 -m pip install pip-audit==2.10.0
      - name: pip-audit
        continue-on-error: true
        run: pip-audit .
